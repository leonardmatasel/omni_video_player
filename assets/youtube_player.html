<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        .embed-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: black;
            transition: background-color 0.2s ease;
        }

        .embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            /* The iframe is fully non-interactive: all gestures are handled by
               the Flutter overlay (the WebView is also wrapped in IgnorePointer).
               This stops YouTube's native player from reacting to taps/hover and
               auto-showing its controls. */
            pointer-events: <<pointerEvents>>;
        }
    </style>
    <title>Youtube Player</title>
</head>
<body>
<div class="embed-container">
    <div id="<<playerId>>"></div>
</div>

<script src="https://www.youtube.com/iframe_api"
        onload="console.log('[OMNI-DIAG-JS] iframe_api script loaded')"
        onerror="console.log('[OMNI-DIAG-JS] iframe_api script FAILED to load')"></script>

<script>
    /* [OMNI-DIAG-JS] temporary diagnostics (remove after debug) */
    window.addEventListener('error', function(ev){
        console.log('[OMNI-DIAG-JS] window error: ' + (ev.message || ev.type));
    });

    var player;
    var progressTimer = null;

    function onYouTubeIframeAPIReady() {
        console.log('[OMNI-DIAG-JS] onYouTubeIframeAPIReady');
        player = new YT.Player("<<playerId>>", {
            host: "https://www.youtube-nocookie.com",
            playerVars: <<playerVars>>,
            events: {
                onReady: function(e) { console.log('[OMNI-DIAG-JS] player onReady'); handleFullScreenForMobilePlatform(); sendMessage("Ready", e); },
                onStateChange: onPlayerStateChange,
                onError: function(e){ console.log('[OMNI-DIAG-JS] player onError ' + e.data); sendMessage("PlayerError", e.data); }
            }
        });
        player.setSize(window.innerWidth, window.innerHeight);
    }

    function onPlayerStateChange(e) {
        sendMessage("StateChange", e.data);
        clearInterval(progressTimer);

        if(e.data === YT.PlayerState.PLAYING) {
            progressTimer = setInterval(()=>{
                try {
                    const state = { currentTime: player.getCurrentTime(), loadedFraction: player.getVideoLoadedFraction() };
                    sendMessage("PlaybackProgress", JSON.stringify(state));
                } catch(e){}
            }, 800);
        }
    }

    // override play
    function play() {
        try { player.playVideo(); } catch(e){}
        return '';
    }

    // override seekTo
    function seekTo(pos, seekAhead) {
        try{ player.seekTo(Number(pos)||0, seekAhead); } catch(e){}
        return '';
    }

    // override loadById
    function loadById(settings) {
        try{ player.loadVideoById(settings); } catch(e){}
        try{ player.playVideo(); } catch(e){}
        return '';
    }

    window.onresize = function(){ try{ player.setSize(window.innerWidth, window.innerHeight); } catch(e){} };
    function sendMessage(key,data){
        var msg={};
        msg[key]=data;
        msg['playerId']='<<playerId>>';
        try{ window.flutter_inappwebview.callHandler(key,data); }
        catch(e){ try{ window.parent.postMessage(JSON.stringify(msg),'*'); } catch(e){} }
    }
    function handleFullScreenForMobilePlatform(){}
</script>
</body>
</html>
